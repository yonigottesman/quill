name: Build & release macOS DMG

# Builds, signs & notarizes Quill.app and publishes a downloadable DMG as a
# GitHub Release — but ONLY when MARKETING_VERSION (project.yml) names a release
# tag that doesn't exist yet. A cheap `gate` job decides up front; if the version
# wasn't bumped, the macOS `build` job is skipped entirely (no build runs at all,
# the run is green). So: bump MARKETING_VERSION to ship, otherwise nothing builds.
#
# Secrets: the same five App Store Connect / Developer ID secrets used by the
# ezdash repo, plus one Sparkle key:
#   CSC_LINK                base64 of the Developer ID Application .p12
#   CSC_KEY_PASSWORD        password protecting that .p12
#   APPLE_API_KEY_P8        base64 of the App Store Connect API key (.p8)
#   APPLE_API_KEY_ID        the key's Key ID
#   APPLE_API_ISSUER        the API key's Issuer ID
#   SPARKLE_ED_PRIVATE_KEY  base64 of the Sparkle EdDSA private key (from
#                           `generate_keys -x`); signs the DMG so Sparkle accepts
#                           the update. The matching public key lives in Info.plist
#                           (SUPublicEDKey).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write          # create the GitHub Release + upload the DMG asset

jobs:
  # ---- decide whether there's anything to build (fast, cheap) ---------------
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(grep 'MARKETING_VERSION' project.yml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          [ -n "$version" ] || { echo "could not read MARKETING_VERSION from project.yml" >&2; exit 1; }
          tag="v$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          # workflow_dispatch always builds (manual escape hatch); a push only
          # builds when its version tag doesn't already have a release.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "::notice::$tag already released — nothing to build. Bump MARKETING_VERSION in project.yml to release a new version."
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "::notice::New version $tag — building and releasing."
          fi

  build:
    needs: gate
    if: needs.gate.outputs.should_build == 'true'
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.gate.outputs.version }}
      TAG: ${{ needs.gate.outputs.tag }}
    steps:
      # Full history: the Sparkle build number is `git rev-list --count HEAD`, and
      # we push the regenerated appcast back to main — both need real history, not
      # checkout's default shallow clone.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build tools
        run: brew install xcodegen cmake

      # ---- import the Developer ID signing identity into a temp keychain ------
      # Done before the costly llama build so missing/bad secrets fail fast.
      - name: Import signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          keychain="$RUNNER_TEMP/signing.keychain-db"
          keychain_pwd="$(uuidgen)"
          security create-keychain -p "$keychain_pwd" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_pwd" "$keychain"
          echo "$CSC_LINK" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$keychain" -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_pwd" "$keychain" >/dev/null
          # Make the temp keychain searchable alongside the existing ones.
          security list-keychains -d user -s "$keychain" $(security list-keychains -d user | sed 's/"//g')
          security find-identity -v -p codesigning "$keychain"

      # ---- embedded llama.cpp framework (cached; multi-minute from source) ----
      # Keyed on the build script (which pins LLAMA_CPP_REF). Bumping the ref =
      # editing the script = a fresh cache key = a rebuild.
      - name: Cache llama.xcframework
        id: llama-cache
        uses: actions/cache@v4
        with:
          path: Frameworks/llama.xcframework
          key: llama-xcframework-${{ runner.os }}-${{ hashFiles('scripts/build-xcframework.sh') }}

      - name: Build llama.xcframework
        if: steps.llama-cache.outputs.cache-hit != 'true'
        run: ./scripts/build-xcframework.sh

      # ---- build, sign (hardened runtime + secure timestamp for notarization) -
      - name: Build & sign Quill.app
        run: |
          xcodegen generate
          # Monotonic build number for Sparkle's CFBundleVersion comparison. The
          # project.yml value (1) is only a local-build placeholder; releases must
          # carry a strictly-increasing number or updates never trigger.
          BUILD=$(git rev-list --count HEAD)
          echo "BUILD=$BUILD" >> "$GITHUB_ENV"
          set -o pipefail
          xcodebuild -project Quill.xcodeproj -scheme Quill \
            -configuration Release \
            -derivedDataPath build \
            -skipMacroValidation \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=29HD5Q85D4 \
            ENABLE_HARDENED_RUNTIME=YES \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            CURRENT_PROJECT_VERSION=$BUILD \
            build 2>&1 | grep -E "BUILD (SUCCEEDED|FAILED)|error:" || true
          app="build/Build/Products/Release/Quill.app"
          [ -d "$app" ] || { echo "Build failed — no app produced." >&2; exit 1; }
          codesign --verify --strict --verbose=2 "$app"
          # Notarization rejects get-task-allow (the debug entitlement xcodebuild
          # injects into `build` output); fail loudly here if it slipped through.
          if codesign -d --entitlements - --xml "$app" 2>/dev/null | grep -q 'get-task-allow'; then
            echo "error: get-task-allow still present — notarization would reject this." >&2
            exit 1
          fi
          echo "APP_PATH=$app" >> "$GITHUB_ENV"

      # ---- re-sign Sparkle's embedded helpers with hardened runtime + timestamp -
      # The notary requires a *secure timestamp* and hardened runtime on every
      # nested executable. xcodebuild's embedded signing applies hardened runtime
      # but not reliably a timestamp to Sparkle's helpers (XPC services, Autoupdate,
      # Updater.app) — so re-sign them inside-out before packaging. Quill itself has
      # no entitlements file, so a plain re-sign keeps it free of get-task-allow.
      - name: Harden Sparkle helpers
        run: |
          ver="$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions/B"
          sign() { codesign --force --options runtime --timestamp --sign "Developer ID Application" "$@"; }
          for x in "$ver/XPCServices/Downloader.xpc" "$ver/XPCServices/Installer.xpc" \
                   "$ver/Autoupdate" "$ver/Updater.app" \
                   "$APP_PATH/Contents/Frameworks/Sparkle.framework" "$APP_PATH"; do
            echo "re-signing $x"; sign "$x"
          done
          codesign --verify --strict --verbose=2 "$APP_PATH"
          if codesign -d --entitlements - --xml "$APP_PATH" 2>/dev/null | grep -q 'get-task-allow'; then
            echo "error: get-task-allow present after re-sign — notarization would reject." >&2
            exit 1
          fi

      # ---- package the DMG ----------------------------------------------------
      - name: Create DMG
        run: |
          dmg="Quill-$VERSION.dmg"
          staging="$RUNNER_TEMP/dmg"
          rm -rf "$staging"; mkdir -p "$staging"
          ditto "$APP_PATH" "$staging/Quill.app"
          ln -s /Applications "$staging/Applications"
          hdiutil create -volname "Quill" -srcfolder "$staging" -ov -format UDZO "$dmg"
          # Sign the disk image itself (then notarize + staple it below) so the
          # DMG — not just the app inside — passes Gatekeeper with no prompt.
          codesign --force --sign "Developer ID Application" --timestamp "$dmg"
          echo "DMG=$dmg" >> "$GITHUB_ENV"

      # ---- notarize the DMG with Apple, then staple the ticket ----------------
      # notarytool notarizes the DMG and the app it contains; stapling the DMG
      # is Apple's recommended approach for DMG distribution (the dragged-out
      # app inherits the notarization, no Gatekeeper warning on download).
      - name: Notarize & staple
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          echo "$APPLE_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          creds=(--key "$RUNNER_TEMP/AuthKey.p8" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER")
          xcrun notarytool submit "$DMG" "${creds[@]}" --wait --output-format json > "$RUNNER_TEMP/notary.json"
          cat "$RUNNER_TEMP/notary.json"
          sub=$(/usr/bin/python3 -c 'import json,sys;print(json.load(open(sys.argv[1]))["id"])' "$RUNNER_TEMP/notary.json")
          status=$(/usr/bin/python3 -c 'import json,sys;print(json.load(open(sys.argv[1]))["status"])' "$RUNNER_TEMP/notary.json")
          if [ "$status" != "Accepted" ]; then
            echo "::error::Notarization $status — full log below:"
            xcrun notarytool log "$sub" "${creds[@]}"
            exit 1
          fi
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      # ---- Sparkle EdDSA signature over the FINAL (stapled) DMG bytes ----------
      # Must run after stapling, since stapling rewrites the DMG. sign_update ships
      # inside Sparkle's resolved SPM artifact. Output is the exact
      # `sparkle:edSignature="…" length="…"` attributes the appcast enclosure needs.
      - name: Sign DMG with Sparkle (EdDSA)
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          # bin/sign_update is the EdDSA tool; exclude the legacy old_dsa_scripts/ one.
          sign=$(find build/SourcePackages/artifacts -name sign_update -type f 2>/dev/null | grep -v old_dsa_scripts | head -1)
          [ -n "$sign" ] || { echo "error: sign_update not found in resolved Sparkle artifact." >&2; exit 1; }
          echo "$SPARKLE_ED_PRIVATE_KEY" | base64 --decode > "$RUNNER_TEMP/sparkle_ed_priv.key"
          out=$("$sign" "$DMG" -f "$RUNNER_TEMP/sparkle_ed_priv.key")
          rm -f "$RUNNER_TEMP/sparkle_ed_priv.key"
          echo "Sparkle: $out"
          echo "ED_SIG=$(printf '%s' "$out" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')" >> "$GITHUB_ENV"
          echo "ED_LEN=$(printf '%s' "$out" | sed -n 's/.*length="\([^"]*\)".*/\1/p')" >> "$GITHUB_ENV"

      # ---- publish the GitHub Release ----------------------------------------
      # create-or-update: a fresh push creates the release; a manual re-run
      # (workflow_dispatch) on an existing tag just re-uploads the DMG.
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # A stable-named copy so README can link to a never-changing URL:
          # /releases/latest/download/Quill.dmg always serves the newest release.
          # cp is post-staple, so the embedded notarization ticket comes along.
          cp "$DMG" Quill.dmg
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$DMG" Quill.dmg --clobber
          else
            gh release create "$TAG" "$DMG" Quill.dmg --title "$TAG" --generate-notes --latest
          fi
          {
            echo "### Quill $TAG released ✅"
            echo "Download: ${{ github.server_url }}/${{ github.repository }}/releases/latest"
          } >> "$GITHUB_STEP_SUMMARY"

      # ---- regenerate the Sparkle appcast and commit it to main ---------------
      # appcast.xml is the feed installed copies poll (SUFeedURL → raw.github…). CI
      # owns it — never hand-edited. We prepend an <item> for this release (pointing
      # at the just-uploaded DMG, with the EdDSA signature) and push it back to main.
      # The [skip ci] commit can't loop: the gate job skips builds once v$VERSION
      # exists, which it now does.
      - name: Update appcast
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          export PUBDATE="$(date -R)"
          python3 - <<'PY'
          import os, xml.etree.ElementTree as ET
          SP = "http://www.andymatuschak.org/xml-namespaces/sparkle"
          ET.register_namespace("sparkle", SP)
          v, build = os.environ["VERSION"], os.environ["BUILD"]
          url = f"https://github.com/yonigottesman/quill/releases/download/v{v}/Quill-{v}.dmg"
          path = "appcast.xml"
          if os.path.exists(path):
              tree = ET.parse(path); rss = tree.getroot(); channel = rss.find("channel")
          else:
              rss = ET.Element("rss", {"version": "2.0"})
              channel = ET.SubElement(rss, "channel")
              ET.SubElement(channel, "title").text = "Quill"
              tree = ET.ElementTree(rss)
          # Drop any existing entry for this build number (idempotent on re-runs).
          for it in channel.findall("item"):
              el = it.find(f"{{{SP}}}version")
              if el is not None and el.text == build:
                  channel.remove(it)
          item = ET.Element("item")
          ET.SubElement(item, "title").text = v
          ET.SubElement(item, f"{{{SP}}}version").text = build
          ET.SubElement(item, f"{{{SP}}}shortVersionString").text = v
          ET.SubElement(item, f"{{{SP}}}minimumSystemVersion").text = "15.0"
          ET.SubElement(item, "pubDate").text = os.environ["PUBDATE"]
          ET.SubElement(item, "enclosure", {
              "url": url,
              "type": "application/octet-stream",
              "length": os.environ["ED_LEN"],
              f"{{{SP}}}edSignature": os.environ["ED_SIG"],
          })
          channel.insert(1, item)  # newest first, just after <title>
          ET.indent(tree, space="  ")
          tree.write(path, encoding="utf-8", xml_declaration=True)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "Release: update appcast for $TAG [skip ci]"
          git push origin HEAD:main
