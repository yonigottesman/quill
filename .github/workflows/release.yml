name: Build & release macOS DMG

# Builds, signs & notarizes Quill.app on every merge to main and publishes a
# downloadable DMG as a GitHub Release.
#
# A release is published ONLY when MARKETING_VERSION (project.yml) names a tag
# that doesn't already exist. So bumping the version in project.yml is all it
# takes to ship a new release — merges that don't bump it still build (as a CI
# check) but skip the release. Re-running the same version is a no-op.
#
# Secrets are the same five App Store Connect / Developer ID secrets used by the
# ezdash repo; populate them in this repo with scripts/setup-ci-secrets.sh:
#   CSC_LINK            base64 of the Developer ID Application .p12
#   CSC_KEY_PASSWORD    password protecting that .p12
#   APPLE_API_KEY_P8    base64 of the App Store Connect API key (.p8)
#   APPLE_API_KEY_ID    the key's Key ID
#   APPLE_API_ISSUER    the API key's Issuer ID
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write          # create the GitHub Release + upload the DMG asset

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # ---- version & "should we release?" gate -------------------------------
      # MARKETING_VERSION lives in project.yml. If a release tagged v<version>
      # already exists, this merge didn't bump it → build only, no release.
      - name: Resolve version
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(grep 'MARKETING_VERSION' project.yml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          [ -n "$version" ] || { echo "could not read MARKETING_VERSION from project.yml" >&2; exit 1; }
          tag="v$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Release $tag already exists — building as a check only. Bump MARKETING_VERSION in project.yml to publish a new release."
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Will publish release $tag."
          fi

      - name: Install build tools
        run: brew install xcodegen cmake

      # ---- import the Developer ID signing identity into a temp keychain ------
      # Done before the costly llama build so missing/bad secrets fail fast.
      - name: Import signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          keychain="$RUNNER_TEMP/signing.keychain-db"
          keychain_pwd="$(uuidgen)"
          security create-keychain -p "$keychain_pwd" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_pwd" "$keychain"
          echo "$CSC_LINK" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$keychain" -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_pwd" "$keychain" >/dev/null
          # Make the temp keychain searchable alongside the existing ones.
          security list-keychains -d user -s "$keychain" $(security list-keychains -d user | sed 's/"//g')
          security find-identity -v -p codesigning "$keychain"

      # ---- embedded llama.cpp framework (cached; multi-minute from source) ----
      # Keyed on the build script (which pins LLAMA_CPP_REF). Bumping the ref =
      # editing the script = a fresh cache key = a rebuild.
      - name: Cache llama.xcframework
        id: llama-cache
        uses: actions/cache@v4
        with:
          path: Frameworks/llama.xcframework
          key: llama-xcframework-${{ runner.os }}-${{ hashFiles('scripts/build-xcframework.sh') }}

      - name: Build llama.xcframework
        if: steps.llama-cache.outputs.cache-hit != 'true'
        run: ./scripts/build-xcframework.sh

      # ---- build, sign (hardened runtime + secure timestamp for notarization) -
      - name: Build & sign Quill.app
        run: |
          xcodegen generate
          set -o pipefail
          xcodebuild -project Quill.xcodeproj -scheme Quill \
            -configuration Release \
            -derivedDataPath build \
            -skipMacroValidation \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=29HD5Q85D4 \
            ENABLE_HARDENED_RUNTIME=YES \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            build 2>&1 | grep -E "BUILD (SUCCEEDED|FAILED)|error:" || true
          app="build/Build/Products/Release/Quill.app"
          [ -d "$app" ] || { echo "Build failed — no app produced." >&2; exit 1; }
          codesign --verify --strict --verbose=2 "$app"
          # Notarization rejects get-task-allow (the debug entitlement xcodebuild
          # injects into `build` output); fail loudly here if it slipped through.
          if codesign -d --entitlements - --xml "$app" 2>/dev/null | grep -q 'get-task-allow'; then
            echo "error: get-task-allow still present — notarization would reject this." >&2
            exit 1
          fi
          echo "APP_PATH=$app" >> "$GITHUB_ENV"

      # ---- package the DMG ----------------------------------------------------
      - name: Create DMG
        run: |
          version="${{ steps.ver.outputs.version }}"
          dmg="Quill-$version.dmg"
          staging="$RUNNER_TEMP/dmg"
          rm -rf "$staging"; mkdir -p "$staging"
          ditto "$APP_PATH" "$staging/Quill.app"
          ln -s /Applications "$staging/Applications"
          hdiutil create -volname "Quill" -srcfolder "$staging" -ov -format UDZO "$dmg"
          echo "DMG=$dmg" >> "$GITHUB_ENV"

      # ---- notarize the DMG with Apple, then staple the ticket ----------------
      # notarytool notarizes the DMG and the app it contains; stapling the DMG
      # is Apple's recommended approach for DMG distribution (the dragged-out
      # app inherits the notarization, no Gatekeeper warning on download).
      - name: Notarize & staple
        if: steps.ver.outputs.release == 'true'
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          echo "$APPLE_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          xcrun notarytool submit "$DMG" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      # ---- publish the GitHub Release ----------------------------------------
      - name: Publish release
        if: steps.ver.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" "$DMG" \
            --title "${{ steps.ver.outputs.tag }}" \
            --generate-notes \
            --latest
          {
            echo "### Quill ${{ steps.ver.outputs.tag }} released ✅"
            echo "Download: ${{ github.server_url }}/${{ github.repository }}/releases/latest"
          } >> "$GITHUB_STEP_SUMMARY"
